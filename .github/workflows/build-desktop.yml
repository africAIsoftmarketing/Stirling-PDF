name: Build Desktop Executables (Mac & Windows)

on:
  push:
    tags:
      - 'v*'  # Déclenchement sur les tags de version
    branches:
      - main  # Optionnel : build sur merge dans main
    paths:
      - 'frontend/src-tauri/**'
      - 'frontend/package*.json'
      - 'Taskfile.yml'
      - '.taskfiles/desktop.yml'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:  # Permet un déclenchement manuel

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # 🍎 MACOS BUILD (Apple Silicon + Intel)
  # ─────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { target: aarch64-apple-darwin, name: macos-aarch64 }   # Apple Silicon M1/M2/M3
          - { target: x86_64-apple-darwin, name: macos-x86_64 }     # Intel Macs

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: 🔧 Install system dependencies
        run: |
          brew install create-dmg

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.arch.target }}

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 📦 Install Task
        uses: go-task/setup-task@v2

      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔨 Prepare desktop build
        run: task desktop:prepare
        env:
          DISABLE_ADDITIONAL_FEATURES: true

      - name: 🏗️ Build Tauri application
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signatures Apple (optionnel - nécessite secrets)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: ./frontend
          tauriScript: npx tauri
          args: --target ${{ matrix.arch.target }} --bundles dmg

      - name: 📦 Rename & collect artifacts
        run: |
          mkdir -p dist
          find frontend/src-tauri/target -name "*.dmg" -exec cp {} dist/Stirling-PDF-${{ matrix.arch.name }}.dmg \;

      - name: 📤 Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stirling-PDF-${{ matrix.arch.name }}
          path: dist/*.dmg
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 🪟 WINDOWS BUILD (x64)
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 📦 Install Task
        uses: go-task/setup-task@v2

      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔨 Prepare desktop build
        run: task desktop:prepare
        env:
          DISABLE_ADDITIONAL_FEATURES: true

      - name: 🏗️ Build Tauri application
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature Windows (optionnel - nécessite secrets DigiCert/PFX)
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: ./frontend
          tauriScript: npx tauri
          args: --target x86_64-pc-windows-msvc --bundles msi,nsis

      - name: 📦 Rename & collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          find frontend/src-tauri/target -name "*.msi" -exec cp {} dist/Stirling-PDF-windows-x86_64.msi \;
          find frontend/src-tauri/target -name "*.exe" -not -path "*/target/debug/*" -exec cp {} dist/Stirling-PDF-windows-x86_64-installer.exe \; 2>/dev/null || true

      - name: 📤 Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stirling-PDF-windows-x86_64
          path: dist/*
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 🚀 PUBLICATION SUR GITHUB RELEASE (sur tag)
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 📝 Generate release notes
        run: |
          echo "## 📦 Stirling-PDF Desktop ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### 🎯 Plateformes supportées" >> release-notes.md
          echo "- 🍎 macOS (Apple Silicon M1/M2/M3 + Intel x64)" >> release-notes.md
          echo "- 🪟 Windows 10/11 (x64)" >> release-notes.md
          echo "" >> release-notes.md
          echo "### 📋 Contenu" >> release-notes.md
          echo "- Application desktop native avec Tauri" >> release-notes.md
          echo "- Runtime Java embarqué (pas d'installation Java requise)" >> release-notes.md
          echo "- Association des fichiers .pdf" >> release-notes.md

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.msi
            artifacts/*.exe
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
