name: Build Desktop App (macOS & Windows)

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # 1. Build the Spring Boot JAR (partagé entre OS)
  # ──────────────────────────────────────────────
  build-jar:
    name: Build Spring Boot JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: africAIsoftmarketing/Stirling-PDF
          fetch-depth: 0

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npx vite build --emptyOutDir
        env:
          NODE_ENV: production

      - name: Build bootJar with Gradle
        run: ./gradlew bootJar --no-daemon -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: stirling-pdf-jar
          path: |
            build/libs/*.jar
            app/core/build/libs/*.jar
          retention-days: 1

  # ──────────────────────────────────────────────
  # 2. Build Tauri pour macOS (arm64 + x86_64)
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: build-jar
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            jre_os: mac
            jre_arch: aarch64
          - arch: x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            jre_os: mac
            jre_arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: africAIsoftmarketing/Stirling-PDF

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: stirling-pdf-jar
          path: frontend/src-tauri/resources/

      - name: Rename JAR
        run: |
          JAR=$(find frontend/src-tauri/resources -name "*.jar" | head -1)
          mv "$JAR" frontend/src-tauri/resources/app.jar

      - name: Setup Java ${{ env.JAVA_VERSION }} (pour jlink)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Create minimal JRE with jlink
        run: |
          JLINK=$JAVA_HOME/bin/jlink
          $JLINK \
            --add-modules java.base,java.compiler,java.desktop,java.instrument,\
            java.logging,java.management,java.naming,java.net.http,java.prefs,\
            java.rmi,java.scripting,java.security.jgss,java.sql,\
            jdk.crypto.ec,jdk.unsupported \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2 \
            --output frontend/src-tauri/resources/jre

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workdir: frontend/src-tauri

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      # Signing macOS (optionnel — décommenter si certificats disponibles)
      # - name: Import Apple certificates
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      #   run: |
      #     echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
      #     security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-keychain-settings -t 3600 -u build.keychain
      #     security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
      #     security list-keychain -d user -s build.keychain

      - name: Build Tauri app (macOS)
        working-directory: frontend
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          npx @tauri-apps/cli build --target ${{ matrix.target }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: stirling-pdf-macos-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
          retention-days: 7

  # ──────────────────────────────────────────────
  # 3. Build Tauri pour Windows (x86_64)
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    needs: build-jar
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: africAIsoftmarketing/Stirling-PDF

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: stirling-pdf-jar
          path: frontend/src-tauri/resources/

      - name: Rename JAR (PowerShell)
        shell: pwsh
        run: |
          $jar = Get-ChildItem "frontend/src-tauri/resources/*.jar" | Select-Object -First 1
          Rename-Item $jar.FullName "app.jar"

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Create minimal JRE with jlink (Windows)
        shell: pwsh
        run: |
          $jlink = "$env:JAVA_HOME\bin\jlink.exe"
          & $jlink `
            --add-modules java.base,java.compiler,java.desktop,java.instrument,java.logging,java.management,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.security.jgss,java.sql,jdk.crypto.ec,jdk.unsupported `
            --strip-debug `
            --no-man-pages `
            --no-header-files `
            --compress=2 `
            --output frontend/src-tauri/resources/jre

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workdir: frontend/src-tauri

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app (Windows)
        working-directory: frontend
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: stirling-pdf-windows-x86_64
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  # ──────────────────────────────────────────────
  # 4. Créer une Release GitHub (sur tag v*.*.*)
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: stirling-pdf-*
          merge-multiple: true

      - name: List release files
        run: find dist/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stirling-PDF ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            dist/**/*.dmg
            dist/**/*.app.tar.gz
            dist/**/*.msi
            dist/**/*.exe
          generate_release_notes: true
